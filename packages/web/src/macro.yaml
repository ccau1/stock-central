id: macro
name: Stock Central
filters:
  tickers:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - TSLA
panels:
  # Row 0: Top-level macro overview cards
  - id: fear-greed
    type: fear-greed
    title: Fear & Greed
    layout: { x: 0, y: 0, w: 3, h: 6 }
    inputs: {}
    refresh_interval: 300

  - id: yield-curve
    type: yield-curve
    title: Yield Curve
    layout: { x: 3, y: 0, w: 3, h: 6 }
    inputs: {}
    refresh_interval: 300

  - id: vix
    type: macro-card
    title: VIX
    layout: { x: 6, y: 0, w: 2, h: 6 }
    inputs:
      source: macro
      symbol: "^VIX"
      invert_colors: true
    refresh_interval: 300

  - id: sp500
    type: macro-card
    title: S&P 500
    layout: { x: 8, y: 0, w: 2, h: 6 }
    inputs:
      source: indexes
      symbol: "^GSPC"
    refresh_interval: 300

  - id: ipo-calendar
    type: ipo-calendar
    title: Upcoming IPOs
    layout: { x: 10, y: 0, w: 2, h: 6 }
    inputs: {}
    refresh_interval: 300

  # Row 6: Stock heatmap (full width)
  - id: stock-heatmap
    type: stock-heatmap
    title: S&P 500 Heat Map
    layout: { x: 0, y: 6, w: 12, h: 14 }
    inputs:
      universe: sp500
    refresh_interval: 300

  # Row 20: Market internals
  - id: market-breadth
    type: market-breadth
    title: Market Breadth
    group: row-market-internals
    layout: { x: 0, y: 0, w: 6, h: 8 }
    inputs: {}
    refresh_interval: 300

  - id: credit-spread
    type: credit-spread
    title: Credit Spread
    group: row-market-internals
    layout: { x: 6, y: 0, w: 6, h: 8 }
    inputs: {}
    refresh_interval: 300

  # Row 29: Macro charts
  - id: ratio-chart
    type: ratio-chart
    title: Intermarket Ratios
    group: row-macro-charts
    layout: { x: 0, y: 0, w: 6, h: 8 }
    inputs: {}
    refresh_interval: 300

  - id: asset-classes
    type: asset-class-grid
    title: Asset Classes
    group: row-macro-charts
    layout: { x: 6, y: 0, w: 6, h: 8 }
    inputs: {}
    refresh_interval: 300

  # Row 38: Sector performance
  - id: sector-heatmap
    type: sector-heatmap
    title: Sector Performance
    group: row-sector-performance
    layout: { x: 0, y: 0, w: 6, h: 8 }
    inputs: {}
    refresh_interval: 300

  - id: macro-remaining
    type: macro-card-grid
    title: Macro Indicators
    group: row-sector-performance
    layout: { x: 6, y: 0, w: 6, h: 8 }
    inputs:
      symbols: ["^TNX", "^FVX", "^DJI", "^IXIC", "^RUT"]
    refresh_interval: 300

  # Row 47: Ticker-driven analysis
  - id: rrg
    type: rrg
    title: Relative Rotation Graph
    group: row-analysis
    layout: { x: 0, y: 0, w: 6, h: 9 }
    inputs:
      benchmark: SPY
      lookback: 3m
      trail_length: 5
    refresh_interval: 300

  - id: metric-card
    type: metric-card
    title: Key Metrics
    group: row-analysis
    layout: { x: 6, y: 0, w: 3, h: 9 }
    inputs:
      metric: pe
    refresh_interval: 120

  - id: news-feed
    type: news-feed
    title: Latest News
    group: row-analysis
    layout: { x: 9, y: 0, w: 3, h: 9 }
    inputs:
      max_items: 5
    refresh_interval: 180

  # Row 57: Risk indicators
  - id: valuation
    type: valuation
    title: Valuation
    group: row-risk
    layout: { x: 0, y: 0, w: 4, h: 8 }
    inputs: {}
    refresh_interval: 300

  - id: recession-risk
    type: recession-risk
    title: Recession Risk
    group: row-risk
    layout: { x: 4, y: 0, w: 4, h: 8 }
    inputs: {}
    refresh_interval: 300

  - id: market-froth
    type: market-froth
    title: Market Froth
    group: row-risk
    layout: { x: 8, y: 0, w: 4, h: 8 }
    inputs: {}
    refresh_interval: 300

groups:
  - id: row-market-internals
    type: __row__
    title: Market Internals
    layout: { x: 0, y: 20, w: 12, h: 9 }
    collapsed: false

  - id: row-macro-charts
    type: __row__
    title: Macro Charts
    layout: { x: 0, y: 29, w: 12, h: 9 }
    collapsed: false

  - id: row-sector-performance
    type: __row__
    title: Sector Performance
    layout: { x: 0, y: 38, w: 12, h: 9 }
    collapsed: false

  - id: row-analysis
    type: __row__
    title: Analysis
    layout: { x: 0, y: 47, w: 12, h: 10 }
    collapsed: false

  - id: row-risk
    type: __row__
    title: Risk & Valuation
    layout: { x: 0, y: 57, w: 12, h: 9 }
    collapsed: false
