services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stockcentral
    volumes:
      - ./__postgres_data__:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -d stockcentral -c 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    environment:
      PORT: 8000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/stockcentral?sslmode=disable
      CORS_ORIGIN: "http://localhost:5000"
      LOG_LEVEL: debug
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      VITE_API_BASE: http://localhost:8000/api/v1
    volumes:
      - ./packages/web:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host"]


